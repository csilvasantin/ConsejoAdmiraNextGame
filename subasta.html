<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Subasta de espacio | admira.live · XpaceOS</title>
<meta name="description" content="Sala de subasta en vivo de un espacio físico del gemelo digital XpaceOS. Puja por el hueco y lanza el creativo ganador a la pantalla real.">
<style>
  :root{--bg:#02080d;--ink:#dff8ff;--mut:#75aab9;--brand:#78f3ff;--accent:#ffd866;--good:#88ffaa;--warn:#ff8866;--card:#0a1620;--card2:#0d1c28;--line:rgba(120,243,255,.18)}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100%}
  body{padding:16px 14px 22px;max-width:520px;margin:0 auto}
  a{color:var(--brand);text-decoration:none}
  .brand{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:14px}
  .brand .logo{font-weight:800;letter-spacing:.04em;font-size:15px}
  .brand .logo b{color:var(--brand)}
  .brand .tag{font-family:monospace;font-size:9px;letter-spacing:.14em;color:var(--mut);text-transform:uppercase;border:1px solid var(--line);border-radius:4px;padding:3px 6px}
  .space{background:linear-gradient(180deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:14px}
  .space .k{font-family:monospace;font-size:9.5px;letter-spacing:.16em;color:var(--mut);text-transform:uppercase}
  .space h1{margin:4px 0 2px;font-size:21px;line-height:1.15}
  .space .sub{color:var(--mut);font-size:12px;font-family:monospace}
  .space .sub b{color:var(--brand)}
  .auction{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px}
  .clock{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px}
  .clock .lbl{font-family:monospace;font-size:10px;letter-spacing:.12em;color:var(--mut);text-transform:uppercase}
  .clock .time{font-family:monospace;font-weight:800;font-size:30px;color:var(--accent)}
  .clock .time.urgent{color:var(--warn);animation:pulse 1s ease-in-out infinite}
  .bar{height:5px;border-radius:99px;background:rgba(120,243,255,.12);overflow:hidden;margin-bottom:16px}
  .bar > i{display:block;height:100%;background:var(--accent);transition:width .9s linear,background .3s}
  .top{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;border:1px solid var(--line);border-radius:10px;background:var(--card2);margin-bottom:14px}
  .top .who{font-size:12px;color:var(--mut);font-family:monospace}
  .top .who b{display:block;color:var(--ink);font-size:15px;font-family:-apple-system,sans-serif}
  .top .who b.you{color:var(--good)}
  .top .amt{font-family:monospace;font-weight:800;font-size:26px;color:var(--good)}
  .pujar{display:flex;gap:8px;margin-bottom:6px}
  .pujar input{flex:1;background:rgba(2,8,13,.7);border:1px solid var(--line);border-radius:9px;color:var(--ink);font-size:16px;font-family:monospace;padding:11px 12px;outline:none}
  .pujar input:focus{border-color:var(--brand);box-shadow:0 0 14px rgba(120,243,255,.22)}
  .pujar button{flex:0 0 auto;background:var(--brand);color:#001620;border:0;border-radius:9px;font-weight:800;font-size:14px;padding:0 18px;cursor:pointer;letter-spacing:.02em}
  .pujar button:disabled{opacity:.5;cursor:default}
  .hint{font-family:monospace;font-size:10px;color:var(--mut);min-height:14px;margin-bottom:2px}
  .hint.err{color:var(--warn)}
  .feed-h{display:flex;align-items:center;justify-content:space-between;margin:4px 0 8px}
  .feed-h h2{margin:0;font-size:13px;letter-spacing:.02em}
  .feed-h .live{font-family:monospace;font-size:9.5px;color:var(--good);display:flex;align-items:center;gap:5px}
  .feed-h .live .dot{width:6px;height:6px;border-radius:50%;background:var(--good);box-shadow:0 0 6px var(--good);animation:pulse 1.4s ease-in-out infinite}
  #feed{display:flex;flex-direction:column;gap:0}
  .row{display:grid;grid-template-columns:1fr auto 58px;gap:8px;align-items:center;padding:7px 8px;border-bottom:1px solid rgba(120,243,255,.06);font-family:monospace;font-size:11px;color:var(--mut);border-radius:4px}
  .row.fresh{background:rgba(255,216,102,.10)}
  .row.you{background:rgba(136,255,170,.10)}
  .row .adv{color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row .adv.you{color:var(--good);font-weight:700}
  .row .amt{color:var(--accent);font-weight:700;text-align:right}
  .row .ts{font-size:9.5px;text-align:right}
  .win{position:relative;background:linear-gradient(180deg,rgba(136,255,170,.10),var(--card));border:1px solid rgba(136,255,170,.4);border-radius:12px;padding:16px;margin-bottom:14px}
  .feed-h-right{display:flex;align-items:center;gap:8px}
  .sec-collapse{flex:0 0 auto;background:transparent;border:1px solid var(--line);color:var(--mut);border-radius:6px;font-size:11px;line-height:1;padding:4px 7px;cursor:pointer}
  .sec-collapse:hover{border-color:var(--brand);color:var(--ink)}
  .sec-collapse.win-x{position:absolute;top:12px;right:12px}
  .sec-collapsed{display:none!important}
  .win.you{border-color:var(--good)}
  .win .k{font-family:monospace;font-size:9.5px;letter-spacing:.16em;color:var(--good);text-transform:uppercase}
  .win h2{margin:6px 0 2px;font-size:20px}
  .win .det{color:var(--mut);font-size:12px;font-family:monospace;margin-bottom:14px}
  .win .det b{color:var(--ink)}
  .preview{position:relative;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#000;margin-bottom:12px;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center}
  .preview video,.preview img{width:100%;height:100%;object-fit:cover;display:block}
  .preview .mute{position:absolute;right:8px;bottom:8px;background:rgba(2,8,13,.82);border:1px solid var(--line);color:var(--ink);border-radius:8px;font-size:15px;line-height:1;padding:7px 9px;cursor:pointer}
  .preview .mute:hover{border-color:var(--brand)}
  .preview .empty{color:var(--mut);font-family:monospace;font-size:11px}
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:0;border-radius:10px;padding:13px;font-weight:800;font-size:14px;cursor:pointer;font-family:-apple-system,sans-serif}
  .btn.go{background:var(--good);color:#001620;margin-bottom:8px}
  .btn.go.ok{background:var(--brand)}
  .btn.go.err{background:var(--warn)}
  .btn.go:disabled{opacity:.6;cursor:default}
  .btn.ghost{background:transparent;color:var(--mut);border:1px solid var(--line)}
  .foot{text-align:center;font-family:monospace;font-size:9.5px;color:var(--mut);letter-spacing:.08em;margin-top:8px}
  .hidden{display:none!important}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
</style>
</head>
<body>
  <div class="brand">
    <div class="logo">admira<b>.live</b> · Subasta</div>
    <div class="tag">XpaceOS · RTB</div>
  </div>

  <div class="space">
    <div class="k">Espacio en subasta</div>
    <h1 id="space-name">Espacio</h1>
    <div class="sub">tienda <b id="space-booth">—</b> · pantalla <b id="space-screen">—</b></div>
  </div>

  <div class="auction" id="auction">
    <div class="clock">
      <span class="lbl">cierra en</span>
      <span class="time" id="clock">0:30</span>
    </div>
    <div class="bar"><i id="bar" style="width:100%"></i></div>
    <div class="top">
      <div class="who">puja más alta<b id="top-who">—</b></div>
      <div class="amt" id="top-amt">€0.00</div>
    </div>
    <div class="pujar">
      <input id="bid-input" type="number" step="0.50" min="0" inputmode="decimal" placeholder="tu puja en €">
      <button id="bid-btn" type="button">Pujar</button>
    </div>
    <div class="hint" id="hint"></div>
    <div class="feed-h">
      <h2>Pujas en vivo</h2>
      <div class="feed-h-right">
        <span class="live"><span class="dot"></span>RTB · second-price</span>
        <button class="sec-collapse" id="feed-collapse" type="button" title="Plegar/expandir las pujas">▾</button>
      </div>
    </div>
    <div id="feed"></div>
  </div>

  <div class="win hidden" id="win">
    <button class="sec-collapse win-x" id="win-collapse" type="button" title="Plegar/expandir el creativo">▾</button>
    <div class="k" id="win-k">Adjudicado</div>
    <h2 id="win-name">—</h2>
    <div class="det">€<b id="win-amt">0.00</b> · <b id="win-space">espacio</b></div>
    <div id="win-body">
      <div id="win-preview" class="preview hidden"></div>
      <button class="btn go" id="launch-btn" type="button">🪙 Lanzar creativo a la pantalla</button>
      <button class="btn ghost" id="again-btn" type="button">↻ Nueva subasta</button>
    </div>
  </div>

  <div class="foot">admira.live · gemelo digital XpaceOS · powered by ADmira</div>

<script>
const PIXER='https://pixer-eleven.csilvasantin.workers.dev';
const ADVERTISERS=['Coca-Cola','El Corte Inglés','BBVA','Iberia','Estrella Galicia','Lotería Nac','Nestlé','Sanitas','Telefónica','Repsol','Mahou','Mercadona','Google','Samsung','L\'Oréal'];
const Q=new URLSearchParams(location.search);
const ESPACIO=(Q.get('espacio')||'').trim();
const SCREEN=(Q.get('screen')||'').trim();
const BOOTH=(Q.get('booth')||'').trim();

function spaceLabel(){
  if(ESPACIO && !/^xtore-/i.test(ESPACIO)) return ESPACIO;
  if(SCREEN) return 'Pantalla '+SCREEN.replace(/^xtore-/i,'').toUpperCase();
  if(BOOTH) return 'Espacio · '+BOOTH;
  return 'Espacio físico';
}
document.getElementById('space-name').textContent=spaceLabel();
document.getElementById('space-booth').textContent=BOOTH||'—';
document.getElementById('space-screen').textContent=SCREEN||'(sin pantalla)';

const ROUND=30;
let secs=ROUND, topAmt=0, topWho='—', topIsYou=false, timer=null, bidTick=null, closed=false;
const $=id=>document.getElementById(id);

function fmt(n){return n.toFixed(2);}
function nowTs(){return new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}

function renderTop(){
  $('top-amt').textContent='€'+fmt(topAmt);
  const who=$('top-who'); who.textContent=topWho; who.className=topIsYou?'you':'';
}
function addRow(adv,amt,you){
  const feed=$('feed');
  const r=document.createElement('div');
  r.className='row fresh'+(you?' you':'');
  r.innerHTML='<span class="adv'+(you?' you':'')+'">'+(you?'★ ':'')+esc(adv)+'</span><span class="amt">€'+fmt(amt)+'</span><span class="ts">'+nowTs()+'</span>';
  feed.prepend(r);
  setTimeout(()=>r.classList.remove('fresh'),900);
  while(feed.children.length>14) feed.removeChild(feed.lastChild);
}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function placeBid(adv,amt,you){
  if(closed) return;
  topAmt=amt; topWho=adv; topIsYou=!!you;
  renderTop(); addRow(adv,amt,you);
}

// Arranque: precio base del hueco
placeBid(ADVERTISERS[Math.floor(Math.random()*ADVERTISERS.length)], 4+Math.random()*3, false);

function simBid(){
  if(closed) return;
  // No siempre puja; más probable cuando queda tiempo
  if(Math.random()<0.25) return;
  const adv=ADVERTISERS[Math.floor(Math.random()*ADVERTISERS.length)];
  if(adv===topWho) return;
  const inc=0.25+Math.random()*1.75;
  placeBid(adv, topAmt+inc, false);
}

function tick(){
  secs--;
  const m=Math.floor(secs/60), s=secs%60;
  $('clock').textContent=m+':'+String(s).padStart(2,'0');
  $('bar').style.width=Math.max(0,(secs/ROUND*100))+'%';
  if(secs<=5){ $('clock').classList.add('urgent'); $('bar').style.background='var(--warn)'; }
  if(secs<=0) closeAuction();
}

function closeAuction(){
  if(closed) return;
  closed=true;
  clearInterval(timer); clearInterval(bidTick);
  $('bid-btn').disabled=true; $('bid-input').disabled=true;
  const win=$('win'); win.classList.remove('hidden');
  win.classList.toggle('you',topIsYou);
  $('win-k').textContent=topIsYou?'¡Has ganado!':'Adjudicado';
  $('win-name').textContent=topWho;
  $('win-amt').textContent=fmt(topAmt);
  $('win-space').textContent=spaceLabel();
  if(!SCREEN){
    const lb=$('launch-btn');
    lb.textContent='(sin pantalla asociada)'; lb.disabled=true;
  }
  revealWinningCreative();
  win.scrollIntoView({behavior:'smooth',block:'center'});
}

// Puja manual
$('bid-btn').addEventListener('click',()=>{
  if(closed) return;
  const v=parseFloat($('bid-input').value);
  const hint=$('hint'); hint.className='hint';
  if(!Number.isFinite(v)||v<=0){ hint.textContent='Introduce un importe válido.'; hint.className='hint err'; return; }
  if(v<=topAmt){ hint.textContent='Tu puja debe superar €'+fmt(topAmt)+'.'; hint.className='hint err'; return; }
  placeBid('TÚ', v, true);
  $('bid-input').value='';
  hint.textContent='Vas en cabeza con €'+fmt(v)+'. Aguanta hasta el cierre.';
  // Un poco de "presión": prolonga la subasta 4s si pujas en el último segundo
  if(secs<=3){ secs+=4; }
});
$('bid-input').addEventListener('keydown',e=>{ if(e.key==='Enter') $('bid-btn').click(); });

// Creativo ganador: se elige al cerrar la subasta, se previsualiza en el
// panel (vídeo muteado por defecto, con toggle de sonido) y es el que se
// lanza a la pantalla real del gemelo (cierra el loop subasta→pantalla).
let stockCache=null, winningCreative=null;
function pushKind(t){ return t==='image'?'image':'video'; }
async function stockCreatives(){
  if(stockCache) return stockCache;
  try{
    const r=await fetch(PIXER+'/stock/list?limit=80',{cache:'no-store'});
    if(!r.ok) return [];
    const d=await r.json();
    const items=Array.isArray(d&&d.items)?d.items:[];
    const v=items.filter(it=>it&&it.url&&['image','video','animation'].includes(it.type));
    if(v.length) stockCache=v;
    return v;
  }catch{ return []; }
}
function renderPreview(cre){
  const box=$('win-preview'); box.classList.remove('hidden');
  if(!cre){ box.innerHTML='<span class="empty">sin creativo disponible en Stock</span>'; return; }
  if(pushKind(cre.type)==='video'){
    // Autoplay exige empezar muteado; el botón 🔇/🔊 deja oírlo a voluntad.
    box.innerHTML='<video id="prev-v" src="'+cre.url+'" autoplay loop muted playsinline></video>'+
      '<button class="mute" id="mute-btn" type="button" title="Oír / silenciar el creativo">🔇</button>';
    const v=$('prev-v'), mb=$('mute-btn');
    mb.addEventListener('click',function(){ v.muted=!v.muted; mb.textContent=v.muted?'🔇':'🔊'; if(!v.muted){ try{ v.play(); }catch(e){} } });
  }else{
    box.innerHTML='<img src="'+cre.url+'" alt="creativo ganador">';
  }
}
async function revealWinningCreative(){
  const cs=await stockCreatives();
  winningCreative = cs.length ? cs[Math.floor(Math.random()*cs.length)] : null;
  renderPreview(winningCreative);
  if(!winningCreative && SCREEN){ const lb=$('launch-btn'); lb.disabled=true; lb.textContent='Sin creativos en Stock'; }
}
$('launch-btn').addEventListener('click',async()=>{
  const b=$('launch-btn'); if(b.disabled) return;
  const cre=winningCreative;
  if(!cre){ b.classList.add('err'); b.textContent='Sin creativo que lanzar'; setTimeout(()=>{b.classList.remove('err');b.textContent='🪙 Lanzar creativo a la pantalla';},2200); return; }
  b.disabled=true; b.classList.remove('ok','err'); b.textContent='… enviando a la pantalla';
  const title='🪙 '+topWho+' ganó '+spaceLabel()+' · €'+fmt(topAmt);
  try{
    const r=await fetch(PIXER+'/signage/push',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({kind:pushKind(cre.type),src:cre.url,mime:cre.mime||null,title})});
    if(!r.ok) throw new Error('http '+r.status);
    b.classList.add('ok'); b.textContent='✓ En la pantalla del gemelo';
  }catch(e){
    b.classList.add('err'); b.textContent='Error al enviar';
    setTimeout(()=>{b.disabled=false;b.classList.remove('err');b.textContent='🪙 Lanzar creativo a la pantalla';},2600);
  }
});
$('again-btn').addEventListener('click',()=>location.reload());

renderTop();
timer=setInterval(tick,1000);
bidTick=setInterval(simBid,1400);

// ── Plegar secciones + reportar la altura al gemelo para que el panel encoja ──
// Así, al plegar "Pujas en vivo" o el creativo, el contenedor del gemelo se
// ajusta y queda sitio para ver la Xtore por detrás.
function postHeight(){
  try{ parent.postMessage({source:'admira-subasta', type:'height', height: Math.ceil(document.documentElement.scrollHeight)}, '*'); }catch(e){}
}
function setupCollapse(btnId, targetId){
  const b=$(btnId), t=$(targetId);
  if(!b||!t) return;
  b.addEventListener('click', ()=>{
    const hidden=t.classList.toggle('sec-collapsed');
    b.textContent=hidden?'▸':'▾';
    postHeight();
  });
}
setupCollapse('feed-collapse','feed');
setupCollapse('win-collapse','win-body');
let _rafH=null;
try{
  const ro=new ResizeObserver(()=>{ if(_rafH) cancelAnimationFrame(_rafH); _rafH=requestAnimationFrame(postHeight); });
  ro.observe(document.documentElement);
}catch(e){ window.addEventListener('resize', postHeight); }
postHeight();
</script>
</body>
</html>
