name: Keep Render API Alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://three2-consejoadmiranextgame.onrender.com/api/council/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: API returned $STATUS"
          fi
