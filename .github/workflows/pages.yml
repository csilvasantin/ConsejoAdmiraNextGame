name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp docs/index.html _site/index.html
          cp docs/styles.css _site/styles.css
          cp docs/app.js _site/app.js
          cp docs/machines.json _site/machines.json
          cp docs/teamwork.html _site/teamwork.html
          cp docs/teamwork.js _site/teamwork.js
          cp docs/snapshots.json _site/snapshots.json
          cp -r docs/snapshots _site/snapshots
          cp docs/control.html _site/control.html 2>/dev/null || true
          cp docs/equipo.html _site/equipo.html 2>/dev/null || true
          cp docs/admin.html _site/admin.html 2>/dev/null || true
          cp public/alta.html _site/alta.html 2>/dev/null || true
          cp public/alta-ceo.html _site/alta-ceo.html 2>/dev/null || true
          cp public/ceo.html _site/ceo.html 2>/dev/null || true
          cp public/consejo.html _site/consejo.html 2>/dev/null || true
          cp public/matrix-pills.jpg _site/matrix-pills.jpg 2>/dev/null || true
          cp public/new-member.html _site/new-member.html 2>/dev/null || true
          cp public/new-member.js _site/new-member.js 2>/dev/null || true
          cp public/network.html _site/network.html 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
