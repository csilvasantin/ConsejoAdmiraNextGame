<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AdmiraNext Team</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="stylesheet" href="./styles.css?v=20260331-4">
  </head>
  <body>
    <div id="gate" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0a0a0a;">
      <form id="gateForm" style="text-align:center;color:#ccc;font-family:system-ui;">
        <h2 style="margin-bottom:12px;">AdmiraNext Team</h2>
        <input id="gateKey" type="password" placeholder="Clave de acceso" autofocus
          style="padding:10px 16px;border-radius:10px;border:1px solid #333;background:#1a1a1a;color:#fff;font-size:16px;width:220px;">
        <button type="submit" style="margin-left:8px;padding:10px 18px;border-radius:10px;border:none;background:#34d399;color:#000;font-weight:600;cursor:pointer;">Entrar</button>
        <p id="gateError" style="color:#f87171;margin-top:8px;display:none;">Clave incorrecta</p>
      </form>
    </div>
    <main class="app" style="display:none;">
      <header class="hero">
        <p class="eyebrow">Control de flota — v2.3.6</p>
        <h1>AdmiraNext Team</h1>
        <p class="subtitle">Separa el Consejo de Administracion en Mac del Equipo en PC para coordinar y ejecutar con claridad.</p>
        <nav class="hero-nav">
          <a href="./consejo.html">Primer Consejo</a>
          <a href="./new-member.html">Alta nueva</a>
          <a href="./teamwork.html">Control →</a>
        </nav>
      </header>

      <section class="summary" id="summary"></section>
      <section id="machines"></section>
    </main>

    <template id="machine-template">
      <article class="card">
        <div class="card-top">
          <div>
            <p class="member"></p>
            <h2 class="name"></h2>
            <p class="role"></p>
          </div>
          <span class="status-badge"></span>
        </div>
        <dl class="meta">
          <div><dt>ID</dt><dd class="id"></dd></div>
          <div><dt>Rol del equipo</dt><dd class="machine-role"></dd></div>
          <div><dt>Ubicación</dt><dd class="location"></dd></div>
          <div><dt>Plataforma</dt><dd class="platform"></dd></div>
          <div><dt>Color</dt><dd class="color"></dd></div>
          <div><dt>Última señal</dt><dd class="last-seen"></dd></div>
        </dl>
        <div class="focus-box">
          <p class="focus-label">Trabajo actual</p>
          <p class="current-focus"></p>
        </div>
        <p class="note"></p>
        <div class="actions">
          <select class="status-select">
            <option value="online">online</option>
            <option value="idle">idle</option>
            <option value="busy">busy</option>
            <option value="offline">offline</option>
            <option value="maintenance">maintenance</option>
          </select>
          <input class="focus-input" type="text" placeholder="Que esta haciendo ahora">
          <input class="note-input" type="text" placeholder="Nota rápida">
          <button class="save-button" type="button">Sincronizar</button>
        </div>
      </article>
    </template>

    <script>
      document.getElementById("gateForm").addEventListener("submit", function(e) {
        e.preventDefault();
        if (document.getElementById("gateKey").value === "Nomeacuerd0") {
          document.getElementById("gate").style.display = "none";
          document.querySelector(".app").style.display = "";
        } else {
          document.getElementById("gateError").style.display = "block";
        }
      });
    </script>
    <script src="./app.js?v=20260331-4" type="module"></script>
  </body>
</html>
