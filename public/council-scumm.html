<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, initial-scale=1.0">
<title>AdmiraNext Council — SCUMM Interface</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { background:#000; overflow:hidden; height:100%; font-family:'Press Start 2P', monospace; }

/* ===== CRT SCANLINE OVERLAY ===== */
#crt-overlay {
  position:fixed; inset:0; z-index:9999; pointer-events:none;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 2px,
    rgba(0,0,0,0.12) 2px,
    rgba(0,0,0,0.12) 4px
  );
}
#crt-overlay::after {
  content:''; position:absolute; inset:0;
  background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.35) 100%);
}

/* ===== MAIN CONTAINER (640x400 logical, scaled 2x) ===== */
#game {
  width:1280px; height:800px; margin:0 auto; position:relative;
  image-rendering:pixelated;
}

/* ===== TOP: COUNCIL ROOM (70%) ===== */
#room {
  width:100%; height:560px; position:relative; overflow:hidden;
  background:
    linear-gradient(180deg, #1a0e05 0%, #2a1608 30%, #3a200c 60%, #2a1608 100%);
}

/* Wood panels */
#room::before {
  content:''; position:absolute; inset:0;
  background:
    repeating-linear-gradient(90deg, transparent 0px, transparent 78px, rgba(0,0,0,0.15) 78px, rgba(0,0,0,0.15) 80px),
    repeating-linear-gradient(180deg, transparent 0px, transparent 38px, rgba(0,0,0,0.08) 38px, rgba(0,0,0,0.08) 40px);
  pointer-events:none;
}

/* Floor */
#room::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:120px;
  background: linear-gradient(180deg, #1a0e05 0%, #0d0703 100%);
  pointer-events:none;
}

/* Ceiling molding */
#molding {
  position:absolute; top:0; left:0; right:0; height:18px;
  background: linear-gradient(180deg, #5a3a1a, #3a200c);
  border-bottom:3px solid #2a1608;
  z-index:1;
}

/* Chandelier */
#chandelier {
  position:absolute; top:18px; left:50%; transform:translateX(-50%); z-index:2;
  width:120px; height:50px; text-align:center;
}
#chandelier::before {
  content:''; position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:4px; height:20px; background:#8a7a5a;
}
#chandelier::after {
  content:'🪔'; font-size:28px; position:absolute; top:16px; left:50%; transform:translateX(-50%);
}

/* Ambient light glow */
#glow {
  position:absolute; top:40px; left:50%; transform:translateX(-50%);
  width:600px; height:300px;
  background: radial-gradient(ellipse at center, rgba(255,200,100,0.06) 0%, transparent 70%);
  pointer-events:none; z-index:1;
}

/* ===== OVAL TABLE ===== */
#table {
  position:absolute; bottom:80px; left:50%; transform:translateX(-50%);
  width:520px; height:180px; z-index:3;
}
#table-surface {
  position:absolute; bottom:0; left:0; right:0;
  width:100%; height:140px;
  background: radial-gradient(ellipse at center, #5a3a1a 0%, #3a200c 70%, #2a1608 100%);
  border-radius:50%; border:4px solid #2a1608;
  box-shadow: 0 8px 0 #1a0e05, inset 0 -10px 20px rgba(0,0,0,0.3);
}

/* Brief on table */
#table-brief {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  color:#c8b89a; font-size:7px; line-height:1.6;
  text-align:center; max-width:280px; z-index:4;
  text-shadow:0 0 4px rgba(200,180,140,0.5);
  display:none;
}
#table-brief.visible { display:block; }

/* Brief input on table */
#brief-input-wrap {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  z-index:5; display:none;
}
#brief-input-wrap.visible { display:flex; flex-direction:column; align-items:center; gap:8px; }
#brief-input {
  width:320px; padding:8px 12px;
  font-family:'Press Start 2P', monospace; font-size:8px; color:#0f0;
  background:rgba(0,0,0,0.85); border:2px solid #0f0;
  outline:none; text-align:center;
}
#brief-input::placeholder { color:#060; }
#brief-hint {
  font-size:6px; color:#0a0;
}

/* ===== AGENT SEATS ===== */
.agent {
  position:absolute; z-index:5; cursor:pointer;
  display:flex; flex-direction:column; align-items:center;
  transition: transform 0.2s;
}
.agent:hover { transform:scale(1.08); }

.agent-avatar {
  width:52px; height:52px; border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  font-size:28px; position:relative;
  background:rgba(0,0,0,0.5); border:2px solid #444;
}

.agent-led {
  position:absolute; top:-4px; right:-4px;
  width:10px; height:10px; border-radius:50%;
  background:#333; border:1px solid #222;
  transition: background 0.3s, box-shadow 0.3s;
}
.agent-led.idle { background:#333; }
.agent-led.thinking { background:#d4a017; box-shadow:0 0 6px #d4a017; animation:pulse 0.8s infinite; }
.agent-led.speaking { background:#0f0; box-shadow:0 0 8px #0f0; animation:pulse 0.5s infinite; }

@keyframes pulse {
  0%,100% { opacity:1; }
  50% { opacity:0.5; }
}

.agent-name {
  margin-top:3px; font-size:6px; padding:2px 6px;
  background:rgba(0,0,0,0.7); border-radius:2px;
  white-space:nowrap; text-align:center;
  line-height:1.4;
}
.agent-role { display:block; font-size:5px; opacity:0.7; }

/* Speech bubble */
.speech-bubble {
  position:absolute; bottom:100%; left:50%; transform:translateX(-50%);
  margin-bottom:8px; padding:8px 10px;
  background:rgba(0,0,0,0.9); border:2px solid;
  border-radius:4px; font-size:6px; color:#ddd;
  max-width:200px; line-height:1.5;
  display:none; z-index:10;
  pointer-events:none;
}
.speech-bubble::after {
  content:''; position:absolute; top:100%; left:50%; transform:translateX(-50%);
  border:6px solid transparent; border-top-color:inherit;
}
.speech-bubble.visible { display:block; animation:fadeInBubble 0.3s ease; }

@keyframes fadeInBubble {
  from { opacity:0; transform:translateX(-50%) translateY(6px); }
  to { opacity:1; transform:translateX(-50%) translateY(0); }
}

/* Agent positions around oval table */
.agent[data-pos="0"] { bottom:280px; left:50%;  transform:translateX(-50%); } /* top center */
.agent[data-pos="1"] { bottom:250px; left:22%; }  /* top-left */
.agent[data-pos="2"] { bottom:180px; left:8%;  }  /* left */
.agent[data-pos="3"] { bottom:110px; left:18%; }  /* bottom-left */
.agent[data-pos="4"] { bottom:80px;  left:50%; transform:translateX(-50%); } /* bottom center */
.agent[data-pos="5"] { bottom:110px; right:18%; } /* bottom-right */
.agent[data-pos="6"] { bottom:180px; right:8%;  } /* right */
.agent[data-pos="7"] { bottom:250px; right:22%; } /* top-right */

/* ===== COUNCIL TOGGLE ===== */
#council-toggle {
  position:absolute; top:28px; right:16px; z-index:20;
  font-family:'Press Start 2P', monospace; font-size:7px;
  background:rgba(0,0,0,0.8); color:#aaa; border:2px solid #555;
  padding:6px 10px; cursor:pointer; border-radius:3px;
}
#council-toggle:hover { color:#fff; border-color:#888; }

/* ===== MIDDLE: ACTION BAR ===== */
#action-bar {
  width:100%; height:36px; background:#000;
  display:flex; align-items:center; justify-content:center;
  border-top:2px solid #222; border-bottom:2px solid #222;
  position:relative;
}
#action-text {
  font-size:10px; color:#fff;
  text-shadow:0 0 4px rgba(255,255,255,0.3);
  text-align:center;
}

/* ===== BOTTOM PANEL ===== */
#bottom {
  width:100%; height:204px; background:#000;
  display:flex;
}

/* Verb Grid */
#verbs {
  width:50%; height:100%; padding:12px 16px;
  display:grid; grid-template-columns:repeat(3, 1fr); grid-template-rows:repeat(3, 1fr);
  gap:6px;
}
.verb-btn {
  font-family:'Press Start 2P', monospace; font-size:9px;
  background:transparent; color:#8a8a8a;
  border:2px solid transparent; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  text-align:center; padding:4px;
  transition: color 0.15s, border-color 0.15s;
}
.verb-btn:hover { color:#ddd; }
.verb-btn.selected { color:#ffd700; border-color:#ffd700; }
.verb-btn.disabled { color:#333; cursor:default; pointer-events:none; }

/* Inventory */
#inventory {
  width:50%; height:100%; padding:12px 16px;
  border-left:2px solid #222;
  display:flex; flex-direction:column;
}
#inv-title {
  font-size:7px; color:#666; margin-bottom:8px;
}
#inv-list {
  flex:1; overflow-y:auto;
}
.inv-item {
  font-size:7px; color:#8a8a8a; padding:6px 8px;
  cursor:pointer; border:1px solid transparent;
  margin-bottom:4px;
  transition: color 0.15s, border-color 0.15s;
}
.inv-item:hover { color:#ddd; }
.inv-item.selected { color:#ffd700; border-color:#ffd700; }
.inv-item::before { content:'📄 '; }

/* ===== MODAL OVERLAY ===== */
#modal {
  position:absolute; inset:0; z-index:50;
  background:rgba(0,0,0,0.85);
  display:none; align-items:center; justify-content:center;
}
#modal.visible { display:flex; }
#modal-content {
  background:#1a0e05; border:3px solid #5a3a1a;
  padding:20px 24px; max-width:600px; max-height:440px;
  overflow-y:auto; border-radius:4px;
}
#modal-title {
  font-size:10px; margin-bottom:12px;
}
#modal-body {
  font-size:7px; color:#c8b89a; line-height:1.8;
}
#modal-close {
  font-family:'Press Start 2P', monospace; font-size:7px;
  background:transparent; color:#888; border:1px solid #555;
  padding:4px 10px; cursor:pointer; margin-top:14px;
}
#modal-close:hover { color:#fff; border-color:#aaa; }

/* ===== DOCUMENT VIEW (Leer mesa) ===== */
#doc-view {
  position:absolute; inset:0; z-index:50;
  background:rgba(0,0,0,0.9);
  display:none; align-items:center; justify-content:center;
}
#doc-view.visible { display:flex; }
#doc-paper {
  background:#f5e6c8; color:#1a1a1a; padding:24px 28px;
  max-width:640px; max-height:500px; overflow-y:auto;
  border-radius:2px; box-shadow:4px 4px 0 rgba(0,0,0,0.5);
}
#doc-paper h2 { font-size:10px; margin-bottom:12px; color:#2a1608; }
#doc-paper .doc-entry { font-size:7px; line-height:1.8; margin-bottom:10px; color:#333; }
#doc-paper .doc-entry strong { color:#1a0e05; }
#doc-close {
  font-family:'Press Start 2P', monospace; font-size:7px;
  background:#2a1608; color:#f5e6c8; border:none;
  padding:6px 12px; cursor:pointer; margin-top:14px; display:block;
}

/* Round indicator */
#round-indicator {
  position:absolute; top:28px; left:16px; z-index:20;
  font-size:7px; color:#666;
  background:rgba(0,0,0,0.7); padding:6px 10px; border-radius:3px;
  border:1px solid #333;
}

/* Scrollbar */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:#111; }
::-webkit-scrollbar-thumb { background:#444; border-radius:3px; }
</style>
</head>
<body>

<div id="crt-overlay"></div>

<div id="game">
  <!-- ROOM -->
  <div id="room">
    <div id="molding"></div>
    <div id="chandelier"></div>
    <div id="glow"></div>

    <div id="round-indicator">Ronda: --</div>
    <button id="council-toggle">Leyendas</button>

    <div id="table">
      <div id="table-surface"></div>
      <div id="table-brief"></div>
      <div id="brief-input-wrap">
        <input id="brief-input" type="text" placeholder="Escribe tu proyecto o brief..." maxlength="200" autocomplete="off">
        <span id="brief-hint">Pulsa ENTER para presentar</span>
      </div>
    </div>

    <!-- Agents injected by JS -->
  </div>

  <!-- ACTION BAR -->
  <div id="action-bar">
    <span id="action-text">Bienvenido al Consejo AdmiraNext</span>
  </div>

  <!-- BOTTOM -->
  <div id="bottom">
    <div id="verbs">
      <button class="verb-btn" data-verb="presentar">Presentar</button>
      <button class="verb-btn" data-verb="debatir">Debatir</button>
      <button class="verb-btn" data-verb="sintetizar">Sintetizar</button>
      <button class="verb-btn" data-verb="mirar">Mirar</button>
      <button class="verb-btn" data-verb="hablar">Hablar con</button>
      <button class="verb-btn" data-verb="leer">Leer</button>
      <button class="verb-btn" data-verb="votar">Votar</button>
      <button class="verb-btn" data-verb="comparar">Comparar</button>
      <button class="verb-btn" data-verb="salir">Salir</button>
    </div>
    <div id="inventory">
      <div id="inv-title">PROYECTOS</div>
      <div id="inv-list"></div>
    </div>
  </div>

  <!-- MODAL -->
  <div id="modal">
    <div id="modal-content">
      <div id="modal-title"></div>
      <div id="modal-body"></div>
      <button id="modal-close">Cerrar</button>
    </div>
  </div>

  <!-- DOCUMENT VIEW -->
  <div id="doc-view">
    <div id="doc-paper">
      <h2>Documento de Brainstorming</h2>
      <div id="doc-entries"></div>
      <button id="doc-close">Cerrar</button>
    </div>
  </div>
</div>

<script>
/* ===== GLOBAL API HOOK (null = simulation mode) ===== */
const COUNCIL_API = null;

/* ===== COUNCIL DATA ===== */
const COUNCILS = {
  leyendas: {
    label: 'Leyendas',
    agents: [
      { role:'CEO', name:'Steve Jobs',     emoji:'🍎', color:'#ffd700', bio:'Visionario cofundador de Apple. Enfoque obsesivo en producto, diseño y experiencia de usuario. Pensamiento de "interseccion" entre tecnologia y humanidades.' },
      { role:'CTO', name:'Steve Wozniak',  emoji:'🔧', color:'#00e5ff', bio:'Genio ingeniero, cofundador de Apple. Maestro del hardware y software elegante. Cree en la tecnologia accesible y abierta.' },
      { role:'COO', name:'Tim Cook',       emoji:'⚙️', color:'#4caf50', bio:'Maestro de operaciones y supply chain. Transforma vision en ejecucion impecable a escala global. Eficiencia sin comprometer calidad.' },
      { role:'CFO', name:'Warren Buffett', emoji:'💰', color:'#f44336', bio:'El Oraculo de Omaha. Inversionista legendario con vision a largo plazo. Busca valor intrinseco y ventajas competitivas duraderas.' },
      { role:'CCO', name:'Walt Disney',    emoji:'🏰', color:'#e040fb', bio:'Padre de la animacion moderna y los parques tematicos. Maestro del storytelling y la experiencia inmersiva. "Si puedes sonarlo, puedes hacerlo."' },
      { role:'CDO', name:'Dieter Rams',    emoji:'📐', color:'#448aff', bio:'Disenador industrial legendario. Sus 10 principios del buen diseno guian generaciones. "Menos pero mejor." Funcionalidad y estetica unidas.' },
      { role:'CXO', name:'Howard Schultz', emoji:'☕', color:'#ff9800', bio:'Transformo Starbucks en experiencia global. Experto en customer experience, cultura de marca y el "tercer lugar" entre hogar y trabajo.' },
      { role:'CSO', name:'George Lucas',   emoji:'🌟', color:'#ab47bc', bio:'Creador de Star Wars e Indiana Jones. Visionario del worldbuilding, narrativa epica y tecnologia cinematografica revolucionaria.' }
    ]
  },
  coetaneos: {
    label: 'Coetaneos',
    agents: [
      { role:'CEO', name:'Elon Musk',       emoji:'🚀', color:'#ffd700', bio:'CEO de Tesla y SpaceX. Visionario de la energia sostenible, exploracion espacial y la interfaz cerebro-computadora.' },
      { role:'CTO', name:'Linus Torvalds',  emoji:'🐧', color:'#00e5ff', bio:'Creador de Linux y Git. Pragmatismo tecnico extremo. "Talk is cheap, show me the code."' },
      { role:'COO', name:'Sheryl Sandberg',  emoji:'📊', color:'#4caf50', bio:'Ex-COO de Meta. Experta en escalar organizaciones, operaciones publicitarias y liderazgo femenino en tecnologia.' },
      { role:'CFO', name:'Ruth Porat',       emoji:'💹', color:'#f44336', bio:'CFO de Alphabet/Google. Disciplina financiera en empresas de hipercrecimiento. Vision estrategica de inversiones tecnologicas.' },
      { role:'CCO', name:'Jony Ive',         emoji:'✨', color:'#e040fb', bio:'Ex-CDO de Apple. Maestro del diseno minimalista. Creo el iPhone, iMac y la estetica que definio una era.' },
      { role:'CDO', name:'John Maeda',       emoji:'🎨', color:'#448aff', bio:'Artista, disenador, tecnologo. Puente entre diseno computacional y simplicidad. Autor de "The Laws of Simplicity".' },
      { role:'CXO', name:'Brian Chesky',     emoji:'🏠', color:'#ff9800', bio:'Cofundador de Airbnb. Revoluciono la hospitalidad con diseno centrado en el usuario y experiencias autenticas.' },
      { role:'CSO', name:'Reed Hastings',    emoji:'🎬', color:'#ab47bc', bio:'Cofundador de Netflix. Estratega de la disrupcion digital, cultura corporativa radical y decision basada en datos.' }
    ]
  }
};

/* ===== STATE ===== */
let currentCouncil = 'leyendas';
let selectedVerb = null;
let selectedInvItem = null;
let currentBrief = null;
let round = 0;
let agentResponses = {}; // { round: { agentIndex: text } }
let isProcessing = false;

/* ===== DOM REFS ===== */
const room = document.getElementById('room');
const actionText = document.getElementById('action-text');
const briefInputWrap = document.getElementById('brief-input-wrap');
const briefInput = document.getElementById('brief-input');
const tableBrief = document.getElementById('table-brief');
const invList = document.getElementById('inv-list');
const roundInd = document.getElementById('round-indicator');
const modal = document.getElementById('modal');
const modalTitle = document.getElementById('modal-title');
const modalBody = document.getElementById('modal-body');
const docView = document.getElementById('doc-view');
const docEntries = document.getElementById('doc-entries');
const councilToggle = document.getElementById('council-toggle');

/* ===== AGENT DOM ===== */
let agentEls = [];

function renderAgents() {
  agentEls.forEach(el => el.remove());
  agentEls = [];
  const agents = COUNCILS[currentCouncil].agents;
  agents.forEach((a, i) => {
    const div = document.createElement('div');
    div.className = 'agent';
    div.dataset.pos = i;
    div.dataset.idx = i;
    div.innerHTML = `
      <div class="speech-bubble" style="border-color:${a.color}"></div>
      <div class="agent-avatar">${a.emoji}<div class="agent-led idle"></div></div>
      <div class="agent-name" style="color:${a.color}">
        ${a.name}
        <span class="agent-role">${a.role}</span>
      </div>
    `;
    div.addEventListener('click', () => onAgentClick(i));
    room.appendChild(div);
    agentEls.push(div);
  });
}

/* ===== VERB HANDLING ===== */
document.querySelectorAll('.verb-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (isProcessing) return;
    const verb = btn.dataset.verb;

    // Deselect all
    document.querySelectorAll('.verb-btn').forEach(b => b.classList.remove('selected'));
    selectedVerb = verb;
    btn.classList.add('selected');

    // Immediate actions
    if (verb === 'presentar') {
      onPresentar();
    } else if (verb === 'debatir') {
      onDebatir();
    } else if (verb === 'sintetizar') {
      onSintetizar();
    } else if (verb === 'leer') {
      onLeer();
    } else if (verb === 'votar') {
      onVotar();
    } else if (verb === 'comparar') {
      onComparar();
    } else if (verb === 'salir') {
      onSalir();
    } else {
      // mirar, hablar con — require clicking an agent
      setAction(verb === 'mirar' ? 'Mirar...' : 'Hablar con...');
    }
  });
});

/* ===== AGENT CLICK ===== */
function onAgentClick(idx) {
  const agent = COUNCILS[currentCouncil].agents[idx];
  if (selectedVerb === 'mirar') {
    showModal(agent.name + ' — ' + agent.role, agent.bio, agent.color);
    clearVerb();
  } else if (selectedVerb === 'hablar') {
    const lastResp = getLastResponse(idx);
    if (lastResp) {
      showModal(agent.name + ' dice:', lastResp, agent.color);
    } else {
      showModal(agent.name, 'Aun no ha dicho nada en este consejo.', agent.color);
    }
    clearVerb();
  } else {
    setAction(agent.name + ' (' + agent.role + ')');
  }
}

function getLastResponse(idx) {
  for (let r = round; r >= 1; r--) {
    if (agentResponses[r] && agentResponses[r][idx]) return agentResponses[r][idx];
  }
  return null;
}

/* ===== VERB ACTIONS ===== */
function onPresentar() {
  setAction('Presentar proyecto en la mesa');
  briefInputWrap.classList.add('visible');
  briefInput.focus();
}

briefInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && briefInput.value.trim()) {
    e.preventDefault();
    submitBrief(briefInput.value.trim());
  }
});

function submitBrief(text) {
  currentBrief = text;
  round = 0;
  agentResponses = {};
  briefInputWrap.classList.remove('visible');
  briefInput.value = '';

  // Show on table
  tableBrief.textContent = '📄 ' + text;
  tableBrief.classList.add('visible');

  // Add to inventory
  addInventoryItem(text);

  setAction('Proyecto presentado: "' + (text.length > 50 ? text.slice(0,50) + '...' : text) + '"');
  clearVerb();

  // Auto-trigger round 1
  startRound(1);
}

function onDebatir() {
  if (!currentBrief) {
    setAction('Primero debes PRESENTAR un proyecto');
    clearVerb();
    return;
  }
  if (round < 1) {
    setAction('Espera a que termine la ronda actual');
    clearVerb();
    return;
  }
  if (round >= 3) {
    setAction('El debate ha concluido. Usa SINTETIZAR.');
    clearVerb();
    return;
  }
  startRound(round + 1);
  clearVerb();
}

function onSintetizar() {
  if (!currentBrief || round < 1) {
    setAction('No hay debate que sintetizar');
    clearVerb();
    return;
  }
  runSynthesis();
  clearVerb();
}

function onLeer() {
  if (!currentBrief) {
    setAction('No hay documento que leer');
    clearVerb();
    return;
  }
  showDocument();
  clearVerb();
}

function onVotar() {
  if (!currentBrief || round < 1) {
    setAction('No hay propuesta para votar');
    clearVerb();
    return;
  }
  runVote();
  clearVerb();
}

function onComparar() {
  if (Object.keys(agentResponses).length < 2) {
    setAction('Se necesitan al menos 2 rondas para comparar');
    clearVerb();
    return;
  }
  showComparison();
  clearVerb();
}

function onSalir() {
  if (confirm('¿Salir del Consejo AdmiraNext?')) {
    window.close();
    // fallback
    setAction('Cierra esta ventana para salir');
  }
  clearVerb();
}

/* ===== ROUND LOGIC ===== */
function startRound(r) {
  if (isProcessing) return;
  isProcessing = true;
  round = r;
  roundInd.textContent = 'Ronda: ' + round + '/3';
  agentResponses[round] = {};
  clearAllBubbles();

  const agents = COUNCILS[currentCouncil].agents;
  setAction('Ronda ' + round + ' — Los consejeros estan deliberando...');

  // Set all to thinking
  agentEls.forEach(el => {
    el.querySelector('.agent-led').className = 'agent-led thinking';
  });

  if (COUNCIL_API) {
    // Future: call real API
    // fetch(COUNCIL_API + '/round', { method:'POST', body: JSON.stringify({brief:currentBrief, round, council:currentCouncil}) })
  }

  // Simulation mode
  const responses = generateSimulatedResponses(round, agents);
  let delay = 800;
  agents.forEach((agent, i) => {
    setTimeout(() => {
      const led = agentEls[i].querySelector('.agent-led');
      const bubble = agentEls[i].querySelector('.speech-bubble');

      led.className = 'agent-led speaking';
      setAction(agent.name + ' dice:');

      const text = responses[i];
      agentResponses[round][i] = text;
      bubble.textContent = text;
      bubble.classList.add('visible');

      // After speaking, go idle and hide bubble after 4s
      setTimeout(() => {
        led.className = 'agent-led idle';
        bubble.classList.remove('visible');

        // Last agent
        if (i === agents.length - 1) {
          isProcessing = false;
          if (round < 3) {
            setAction('Ronda ' + round + ' completada. Usa DEBATIR para continuar.');
          } else {
            setAction('Debate finalizado. Usa SINTETIZAR para la conclusion.');
          }
        }
      }, 3500);
    }, delay);
    delay += 2200;
  });
}

function generateSimulatedResponses(r, agents) {
  const briefShort = currentBrief.length > 30 ? currentBrief.slice(0,30) + '...' : currentBrief;
  const roundPhrases = {
    1: [
      (a) => `Desde ${a.role}, veo gran potencial en "${briefShort}". Propongo enfocarnos en diferenciacion.`,
      (a) => `Tecnicamente viable. Necesitamos evaluar la arquitectura y escalabilidad del proyecto.`,
      (a) => `Puedo estructurar la operacion en 3 fases para minimizar riesgo y maximizar eficiencia.`,
      (a) => `Los numeros deben cuadrar. Necesito un analisis de ROI antes de comprometer recursos.`,
      (a) => `La narrativa es clave. Debemos crear una historia que conecte emocionalmente con el publico.`,
      (a) => `El diseno debe ser invisible. Funcionalidad pura, sin decoracion innecesaria.`,
      (a) => `La experiencia del usuario lo es todo. Cada touchpoint debe ser memorable.`,
      (a) => `Estrategicamente, esto nos posiciona contra la competencia de forma unica.`
    ],
    2: [
      (a) => `Coincido con el CCO en la narrativa, pero el producto debe hablar por si mismo.`,
      (a) => `He analizado la viabilidad. Podemos usar tecnologia existente y reducir time-to-market.`,
      (a) => `Si el CTO confirma los plazos, tengo el plan operativo listo en 48 horas.`,
      (a) => `Con las fases que propone el COO, el breakeven seria en 18 meses. Aceptable.`,
      (a) => `Imaginad: el usuario abre esto y siente magia. Eso es lo que debemos lograr.`,
      (a) => `Menos features, mejor ejecutadas. Propongo reducir el scope inicial un 40%.`,
      (a) => `Los tests con usuarios que propongo validaran si la experiencia realmente funciona.`,
      (a) => `La estrategia de lanzamiento deberia ser por fases: beta cerrada, luego publica.`
    ],
    3: [
      (a) => `Mi posicion final: esto puede cambiar las reglas del juego si ejecutamos con excelencia.`,
      (a) => `Stack definido, equipo necesario estimado. Estoy listo para comenzar el sprint 0.`,
      (a) => `Plan operativo consolidado. Timeline agresivo pero alcanzable.`,
      (a) => `Apruebo la inversion con las metricas propuestas. Revision trimestral obligatoria.`,
      (a) => `La campana de lanzamiento esta conceptualizada. Sera inolvidable.`,
      (a) => `El sistema de diseno esta definido. Coherencia visual garantizada.`,
      (a) => `Journey del usuario mapeado. Cada momento de friccion identificado y resuelto.`,
      (a) => `Plan estrategico a 3 anos con milestones claros. Vamos a por ello.`
    ]
  };
  return (roundPhrases[r] || roundPhrases[1]).map((fn, i) => fn(agents[i]));
}

function runSynthesis() {
  if (isProcessing) return;
  isProcessing = true;
  setAction('El CEO sintetiza las conclusiones del consejo...');
  const ceo = COUNCILS[currentCouncil].agents[0];
  const led = agentEls[0].querySelector('.agent-led');
  const bubble = agentEls[0].querySelector('.speech-bubble');

  clearAllBubbles();
  led.className = 'agent-led speaking';

  setTimeout(() => {
    const synthesis = `SINTESIS DEL CONSEJO: El proyecto "${currentBrief}" ha sido evaluado en ${round} rondas. ` +
      `El equipo recomienda proceder con un MVP en 3 fases, ` +
      `inversion controlada con revision trimestral, ` +
      `diseno minimalista centrado en el usuario, ` +
      `y estrategia de lanzamiento por fases. ` +
      `Decision: APROBADO con condiciones.`;
    bubble.textContent = synthesis;
    bubble.classList.add('visible');
    agentResponses['sintesis'] = { 0: synthesis };
    setAction(ceo.name + ' ha presentado la sintesis final.');
    roundInd.textContent = 'COMPLETADO';

    setTimeout(() => {
      led.className = 'agent-led idle';
      isProcessing = false;
    }, 6000);
  }, 2500);
}

function runVote() {
  if (isProcessing) return;
  isProcessing = true;
  setAction('Los consejeros votan...');

  const agents = COUNCILS[currentCouncil].agents;
  const votes = ['A FAVOR', 'A FAVOR', 'A FAVOR', 'CON RESERVAS', 'A FAVOR', 'A FAVOR', 'A FAVOR', 'A FAVOR'];
  let delay = 500;

  clearAllBubbles();

  agents.forEach((agent, i) => {
    setTimeout(() => {
      const led = agentEls[i].querySelector('.agent-led');
      const bubble = agentEls[i].querySelector('.speech-bubble');
      led.className = 'agent-led speaking';
      bubble.textContent = '🗳️ ' + votes[i];
      bubble.classList.add('visible');

      setTimeout(() => {
        led.className = 'agent-led idle';
        if (i === agents.length - 1) {
          isProcessing = false;
          setAction('Votacion: 7 a favor, 1 con reservas. APROBADO.');
        }
      }, 2000);
    }, delay);
    delay += 600;
  });
}

function showComparison() {
  let html = '';
  const agents = COUNCILS[currentCouncil].agents;
  for (let r = 1; r <= round; r++) {
    if (!agentResponses[r]) continue;
    html += `<div style="margin-bottom:14px"><strong style="color:#ffd700">— Ronda ${r} —</strong></div>`;
    agents.forEach((a, i) => {
      if (agentResponses[r][i]) {
        html += `<div style="margin-bottom:6px"><strong style="color:${a.color}">${a.name} (${a.role}):</strong> ${agentResponses[r][i]}</div>`;
      }
    });
  }
  showModal('Comparacion de Rondas', html, '#ffd700', true);
}

/* ===== DOCUMENT VIEW ===== */
function showDocument() {
  let html = `<div class="doc-entry"><strong>BRIEF:</strong> ${currentBrief}</div><hr style="border-color:#ccc;margin:10px 0">`;
  const agents = COUNCILS[currentCouncil].agents;
  for (let r = 1; r <= round; r++) {
    if (!agentResponses[r]) continue;
    html += `<div class="doc-entry"><strong>RONDA ${r}:</strong></div>`;
    agents.forEach((a, i) => {
      if (agentResponses[r][i]) {
        html += `<div class="doc-entry"><strong>${a.name}:</strong> ${agentResponses[r][i]}</div>`;
      }
    });
    html += '<hr style="border-color:#ccc;margin:10px 0">';
  }
  if (agentResponses['sintesis']) {
    html += `<div class="doc-entry"><strong>SINTESIS:</strong> ${agentResponses['sintesis'][0]}</div>`;
  }
  docEntries.innerHTML = html;
  docView.classList.add('visible');
}

document.getElementById('doc-close').addEventListener('click', () => {
  docView.classList.remove('visible');
});

/* ===== MODAL ===== */
function showModal(title, body, color, isHtml) {
  modalTitle.style.color = color || '#fff';
  modalTitle.textContent = title;
  if (isHtml) {
    modalBody.innerHTML = body;
  } else {
    modalBody.textContent = body;
  }
  modal.classList.add('visible');
}

document.getElementById('modal-close').addEventListener('click', () => {
  modal.classList.remove('visible');
});

/* ===== INVENTORY ===== */
function addInventoryItem(text) {
  const div = document.createElement('div');
  div.className = 'inv-item';
  div.textContent = text.length > 30 ? text.slice(0,30) + '...' : text;
  div.title = text;
  div.addEventListener('click', () => {
    document.querySelectorAll('.inv-item').forEach(it => it.classList.remove('selected'));
    div.classList.add('selected');
    selectedInvItem = text;
    setAction('Seleccionado: "' + (text.length > 40 ? text.slice(0,40) + '...' : text) + '"');
  });
  invList.appendChild(div);
}

/* ===== COUNCIL TOGGLE ===== */
councilToggle.addEventListener('click', () => {
  if (isProcessing) return;
  currentCouncil = currentCouncil === 'leyendas' ? 'coetaneos' : 'leyendas';
  councilToggle.textContent = COUNCILS[currentCouncil].label;
  renderAgents();
  // Reset state
  currentBrief = null;
  round = 0;
  agentResponses = {};
  tableBrief.classList.remove('visible');
  roundInd.textContent = 'Ronda: --';
  invList.innerHTML = '';
  setAction('Consejo cambiado a: ' + COUNCILS[currentCouncil].label);
});

/* ===== HELPERS ===== */
function setAction(text) {
  actionText.textContent = text;
}

function clearVerb() {
  selectedVerb = null;
  document.querySelectorAll('.verb-btn').forEach(b => b.classList.remove('selected'));
}

function clearAllBubbles() {
  document.querySelectorAll('.speech-bubble').forEach(b => b.classList.remove('visible'));
}

/* ===== INIT ===== */
renderAgents();
</script>
