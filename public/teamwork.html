<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AdmiraNext TeamWork</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="stylesheet" href="./styles.css?v=20260327-1">
    <style>
      .tw-nav { margin-top: 14px; text-align: right; }
      .tw-nav a { color: var(--accent); text-decoration: none; font-size: 14px; font-weight: 600; }
      .tw-nav a:hover { text-decoration: underline; }

      .tw-panel {
        margin-top: 18px;
        padding: 24px;
        border: 1px solid var(--line);
        border-radius: 22px;
        background: var(--panel);
        backdrop-filter: blur(12px);
        box-shadow: 0 16px 40px rgba(23, 49, 39, 0.06);
      }

      .tw-command {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .tw-quick {
        width: 100%;
        padding: 16px 18px;
        border-radius: 16px;
        border: 2px solid var(--line);
        font: inherit;
        font-size: 17px;
        transition: border-color 0.2s;
      }
      .tw-quick:focus { outline: none; border-color: var(--accent); }
      .tw-quick::placeholder { color: var(--muted); }

      .tw-row { display: grid; grid-template-columns: 1fr auto 2fr auto; gap: 10px; align-items: end; }

      .tw-label {
        display: block;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin-bottom: 6px;
      }

      .tw-select, .tw-textarea {
        width: 100%;
        border-radius: 14px;
        border: 1px solid var(--line);
        padding: 12px 14px;
        font: inherit;
      }

      .tw-textarea { resize: vertical; min-height: 44px; }

      .tw-send {
        padding: 12px 28px;
        border-radius: 14px;
        border: none;
        background: var(--ink);
        color: white;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        white-space: nowrap;
      }
      .tw-send:hover { opacity: 0.92; }
      .tw-send:disabled { opacity: 0.5; cursor: default; }

      .tw-feedback {
        margin-top: 12px;
        padding: 12px 16px;
        border-radius: 14px;
        font-size: 14px;
        display: none;
      }
      .tw-feedback.ok { display: block; background: rgba(26, 127, 90, 0.12); color: var(--accent); }
      .tw-feedback.err { display: block; background: rgba(139, 91, 99, 0.12); color: var(--offline); }

      .tw-history { margin-top: 24px; }
      .tw-history h3 { font-size: 16px; color: var(--muted); margin: 0 0 12px; }

      .tw-entry {
        padding: 12px 0;
        border-bottom: 1px solid var(--line);
        font-size: 14px;
      }

      .tw-entry-machine {
        font-weight: 700;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--accent);
      }

      .tw-entry-prompt { color: var(--ink); }

      .tw-entry-time { color: var(--muted); font-size: 12px; white-space: nowrap; }

      .tw-entry-status {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-left: 6px;
      }
      .tw-entry-status.sent { background: var(--accent); }
      .tw-entry-status.error { background: var(--offline); }

      .tw-entry-target {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 6px;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        background: rgba(26, 127, 90, 0.12);
        color: var(--accent);
        margin: 0 4px;
        vertical-align: middle;
      }

      .tw-entry-header {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 10px;
        align-items: center;
      }

      .tw-screenshot {
        margin-top: 10px;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid var(--line);
      }
      .tw-screenshot img {
        width: 100%;
        display: block;
      }

      .tw-terminal {
        margin-top: 10px;
        border-radius: 12px;
        overflow: hidden;
        background: #1a1a2e;
        color: #a8e6cf;
        font-family: "SF Mono", "Menlo", "Monaco", monospace;
        font-size: 12px;
        line-height: 1.5;
      }
      .tw-terminal pre {
        margin: 0;
        padding: 14px 16px;
        white-space: pre-wrap;
        word-break: break-all;
        max-height: 300px;
        overflow-y: auto;
      }
      .tw-terminal-loading {
        display: block;
        padding: 14px 16px;
        color: #5f7469;
        font-style: italic;
      }

      .tw-empty { color: var(--muted); font-size: 14px; }

      @media (max-width: 640px) {
        .tw-row { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <p class="eyebrow">Comunicacion remota</p>
        <h1>TeamWork</h1>
        <p class="subtitle">Envía prompts a Claude en cualquier máquina del equipo.</p>
        <nav class="tw-nav"><a href="./index.html">Volver al dashboard</a></nav>
      </header>

      <section class="tw-panel">
        <div class="tw-command">
          <input class="tw-quick" id="quickInput" type="text"
                 placeholder="MacBookAir16 pregunta al terminal whoami"
                 autocomplete="off" autofocus>
          <div class="tw-row">
            <div>
              <span class="tw-label">Máquina</span>
              <select class="tw-select" id="machineSelect"></select>
            </div>
            <div>
              <span class="tw-label">Destino</span>
              <select class="tw-select" id="targetSelect">
                <option value="claude">Claude</option>
                <option value="codex">Codex</option>
                <option value="terminal">Terminal</option>
              </select>
            </div>
            <div>
              <span class="tw-label">Prompt</span>
              <textarea class="tw-textarea" id="promptArea" rows="1" placeholder="Escribe el prompt aquí..."></textarea>
            </div>
            <div>
              <span class="tw-label">&nbsp;</span>
              <button class="tw-send" id="sendBtn">Enviar</button>
            </div>
          </div>
        </div>
        <div class="tw-feedback" id="feedback"></div>
      </section>

      <section class="tw-panel tw-history">
        <h3>Historial</h3>
        <div id="historyList"><p class="tw-empty">Sin comandos enviados todavía.</p></div>
      </section>
    </main>

    <script src="./teamwork.js?v=20260327-6" type="module"></script>
  </body>
</html>
