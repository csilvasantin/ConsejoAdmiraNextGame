<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AdmiraNext — Mapa de Red</title>
    <link rel="stylesheet" href="./styles.css?v=20260321-3">
    <style>
      .map-wrap {
        margin-top: 18px;
        border: 1px solid rgba(23,49,39,0.12);
        border-radius: 28px;
        background: rgba(255,255,255,0.84);
        backdrop-filter: blur(12px);
        box-shadow: 0 16px 40px rgba(23,49,39,0.06);
        padding: 32px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
      }
      svg { width: 100%; max-width: 820px; height: auto; }
      .label-main { font: 700 14px "Avenir Next","Segoe UI",sans-serif; fill: #173127; }
      .label-sub  { font: 400 11px "Avenir Next","Segoe UI",sans-serif; fill: #5f7469; }
      .label-ip   { font: 600 11px "SF Mono","Fira Mono",monospace; fill: #1a7f5a; }
      .label-ts   { font: 600 11px "SF Mono","Fira Mono",monospace; fill: #7c3aed; }
      .badge      { font: 700 9px "Avenir Next","Segoe UI",sans-serif; fill: white; letter-spacing:.06em; }
      .section-label { font: 700 11px "Avenir Next","Segoe UI",sans-serif; fill: #5f7469; letter-spacing:.12em; text-transform: uppercase; }
      .dot-online { fill: #1a7f5a; }
      .dot-busy   { fill: #d0891f; }
      .dot-offline{ fill: #8b5b63; }
      .tabs { display: flex; gap: 10px; }
      .tab {
        padding: 8px 20px;
        border-radius: 999px;
        border: 1px solid rgba(23,49,39,0.15);
        background: white;
        font: 600 13px "Avenir Next","Segoe UI",sans-serif;
        color: #5f7469;
        cursor: pointer;
      }
      .tab.active {
        background: #173127;
        color: white;
        border-color: #173127;
      }
      .map-view { display: none; width: 100%; }
      .map-view.active { display: flex; justify-content: center; }
    </style>
  </head>

    <script>
      function showMap(type) {
        document.querySelectorAll('.map-view').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.getElementById('map-' + type).classList.add('active');
        event.target.classList.add('active');
      }
    </script>
  </body>
</html>
